@layer utilities {
  .line-clamp-3 {
    display: -webkit-box;
    -webkit-line-clamp: 3;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }
  .gradient-primary {
    background:
      linear-gradient(
        to right,
        var(--primary-gradient-from),
        var(--primary-gradient-to));
  }
  .gradient-primary-hover:hover {
    background:
      linear-gradient(
        to right,
        var(--primary-gradient-from),
        var(--primary-gradient-to));
    filter: brightness(1.1);
  }
  .gradient-secondary {
    background:
      linear-gradient(
        to right,
        var(--secondary-gradient-from),
        var(--secondary-gradient-to));
  }
  .gradient-coming-soon {
    background:
      linear-gradient(
        to right,
        var(--coming-soon-from),
        var(--coming-soon-to));
  }
  .gradient-header-text {
    background:
      linear-gradient(
        to right,
        var(--header-text-from),
        var(--header-text-via),
        var(--header-text-to));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    color: transparent;
    display: inline-block;
  }
  .bg-gradient-to-br.from-pink-50,

    background: var(--page-background) !important;

    color: var(--button-text-color);

  }
}
