  <!-- orange-50 -->
  <rect x="40" y="112" width="88" height="60" rx="8" fill="#fff7ed"/>
  <text x="84" y="188" font-family="'Courier New', monospace" font-size="10" fill="#aaa" text-anchor="middle">#fff7ed</text>
  <text x="84" y="200" font-family="Inter, sans-serif" font-size="10" fill="#666" text-anchor="middle">orange-50</text>

  <!-- orange-100 -->
  <rect x="138" y="112" width="88" height="60" rx="8" fill="#ffedd5"/>
  <text x="182" y="188" font-family="'Courier New', monospace" font-size="10" fill="#aaa" text-anchor="middle">#ffedd5</text>
  <text x="182" y="200" font-family="Inter, sans-serif" font-size="10" fill="#666" text-anchor="middle">orange-100</text>

  <!-- orange-200 -->
  <rect x="236" y="112" width="88" height="60" rx="8" fill="#fed7aa"/>
  <text x="280" y="188" font-family="'Courier New', monospace" font-size="10" fill="#aaa" text-anchor="middle">#fed7aa</text>
  <text x="280" y="200" font-family="Inter, sans-serif" font-size="10" fill="#666" text-anchor="middle">orange-200</text>

