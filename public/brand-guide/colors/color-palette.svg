  <rect x="334" y="112" width="88" height="60" rx="8" fill="#fdba74"/>
  <text x="378" y="188" font-family="'Courier New', monospace" font-size="10" fill="#aaa" text-anchor="middle">#fdba74</text>
  <text x="378" y="200" font-family="Inter, sans-serif" font-size="10" fill="#666" text-anchor="middle">orange-300</text>

  <!-- orange-400 -->
  <rect x="432" y="112" width="88" height="60" rx="8" fill="#fb923c"/>
  <text x="476" y="188" font-family="'Courier New', monospace" font-size="10" fill="#aaa" text-anchor="middle">#fb923c</text>
  <text x="476" y="200" font-family="Inter, sans-serif" font-size="10" fill="#666" text-anchor="middle">orange-400</text>

