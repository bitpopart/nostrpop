  <rect x="480" y="364" width="100" height="50" rx="8" fill="#e5e7eb" stroke="#d1d5db" stroke-width="1"/>
  <text x="530" y="428" font-family="'Courier New', monospace" font-size="10" fill="#888" text-anchor="middle">#e5e7eb</text>
  <text x="530" y="440" font-family="Inter, sans-serif" font-size="10" fill="#666" text-anchor="middle">border / input</text>

  <rect x="590" y="364" width="100" height="50" rx="8" fill="#f7f8f9" stroke="#e2e5e8" stroke-width="1"/>
  <text x="640" y="428" font-family="'Courier New', monospace" font-size="10" fill="#888" text-anchor="middle">#f7f8f9</text>
  <text x="640" y="440" font-family="Inter, sans-serif" font-size="10" fill="#666" text-anchor="middle">page background</text>

  <rect x="700" y="364" width="100" height="50" rx="8" fill="#ffffff" stroke="#e2e5e8" stroke-width="1"/>
  <text x="750" y="428" font-family="'Courier New', monospace" font-size="10" fill="#888" text-anchor="middle">#ffffff</text>
  <text x="750" y="440" font-family="Inter, sans-serif" font-size="10" fill="#666" text-anchor="middle">card / nav bg</text>

