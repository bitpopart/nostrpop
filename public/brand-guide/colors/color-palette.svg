<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 560" width="820" height="560">
  <rect width="820" height="560" fill="#111111"/>

  <!-- Title -->
  <text x="40" y="44" font-family="Inter, system-ui, sans-serif" font-size="22" font-weight="800" fill="white" letter-spacing="1">BitPopArt — Color Palette</text>
  <text x="40" y="64" font-family="Inter, system-ui, sans-serif" font-size="13" fill="#666">bitpopart.com · Nostr Pop Art</text>

