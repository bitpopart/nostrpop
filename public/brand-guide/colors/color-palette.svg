  <rect x="40" y="480" width="100" height="50" rx="8" fill="#0a0a0a" stroke="#222" stroke-width="1"/>
  <text x="90" y="544" font-family="'Courier New', monospace" font-size="10" fill="#aaa" text-anchor="middle">#0a0a0a</text>

  <rect x="150" y="480" width="100" height="50" rx="8" fill="#111827" stroke="#222" stroke-width="1"/>
  <text x="200" y="544" font-family="'Courier New', monospace" font-size="10" fill="#aaa" text-anchor="middle">#111827</text>

  <rect x="260" y="480" width="100" height="50" rx="8" fill="#1f2937" stroke="#222" stroke-width="1"/>
  <text x="310" y="544" font-family="'Courier New', monospace" font-size="10" fill="#aaa" text-anchor="middle">#1f2937</text>

  <rect x="370" y="480" width="100" height="50" rx="8" fill="#431407"/>
  <text x="420" y="544" font-family="'Courier New', monospace" font-size="10" fill="#aaa" text-anchor="middle">#431407</text>

  <rect x="480" y="480" width="100" height="50" rx="8" fill="#7c2d12"/>
  <text x="530" y="544" font-family="'Courier New', monospace" font-size="10" fill="#aaa" text-anchor="middle">#7c2d12</text>

  <rect x="590" y="480" width="100" height="50" rx="8" fill="#9a3412"/>
  <text x="640" y="544" font-family="'Courier New', monospace" font-size="10" fill="#aaa" text-anchor="middle">#9a3412</text>

  <rect x="700" y="480" width="100" height="50" rx="8" fill="#fbbf24"/>
  <text x="750" y="544" font-family="'Courier New', monospace" font-size="10" fill="#aaa" text-anchor="middle">#fbbf24</text>
