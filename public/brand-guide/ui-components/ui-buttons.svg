<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 480" width="820" height="480">
  <rect width="820" height="480" fill="#111111"/>
  <text x="40" y="44" font-family="Inter, system-ui, sans-serif" font-size="20" font-weight="800" fill="white">UI Components — Buttons &amp; Badges</text>
  <text x="40" y="62" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#555">BitPopArt · bitpopart.com</text>

  <!-- Section: Buttons -->
  <text x="40" y="96" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="700" fill="#666" letter-spacing="2">BUTTONS</text>

  <!-- Primary CTA: orange-pink gradient -->
  <defs>
    <linearGradient id="btn-cta" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#f97316"/>
      <stop offset="100%" style="stop-color:#ec4899"/>
    </linearGradient>
    <linearGradient id="btn-orange" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#f97316"/>
      <stop offset="100%" style="stop-color:#ea580c"/>
    </linearGradient>
  </defs>

  <rect x="40" y="108" width="200" height="42" rx="8" fill="url(#btn-cta)"/>
  <text x="140" y="134" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="700" fill="white" text-anchor="middle">Publish to Nostr ⚡</text>
  <text x="140" y="166" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#666" text-anchor="middle">Primary CTA · from-orange-500 to-pink-500</text>

  <!-- Orange solid -->
  <rect x="260" y="108" width="160" height="42" rx="8" fill="#f97316"/>
  <text x="340" y="134" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="700" fill="white" text-anchor="middle">Order Now</text>
  <text x="340" y="166" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#666" text-anchor="middle">orange-500 solid</text>

  <!-- Outline -->
  <rect x="440" y="108" width="160" height="42" rx="8" fill="none" stroke="#f97316" stroke-width="1.5"/>
  <text x="520" y="134" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="600" fill="#f97316" text-anchor="middle">Download</text>
  <text x="520" y="166" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#666" text-anchor="middle">Outline · orange border</text>

  <!-- Ghost -->
  <rect x="620" y="108" width="160" height="42" rx="8" fill="rgba(249,115,22,0.1)"/>
  <text x="700" y="134" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="600" fill="#f97316" text-anchor="middle">View History</text>
  <text x="700" y="166" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#666" text-anchor="middle">Ghost / subtle tint</text>

  <!-- Disabled -->
  <rect x="40" y="188" width="160" height="38" rx="8" fill="#374151" opacity="0.6"/>
  <text x="120" y="212" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="600" fill="#9ca3af" text-anchor="middle">Uploading…</text>
  <text x="120" y="240" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#666" text-anchor="middle">Disabled state</text>

  <!-- Icon-only -->
  <rect x="220" y="188" width="38" height="38" rx="8" fill="none" stroke="#e5e7eb" stroke-width="1.5"/>
  <text x="239" y="212" font-family="Inter, system-ui, sans-serif" font-size="16" fill="#6b7280" text-anchor="middle">↓</text>
  <text x="239" y="240" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#666" text-anchor="middle">Icon-only</text>

  <!-- Small -->
  <rect x="280" y="196" width="120" height="30" rx="6" fill="url(#btn-orange)"/>
  <text x="340" y="216" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="700" fill="white" text-anchor="middle">Refresh</text>
  <text x="340" y="240" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#666" text-anchor="middle">Small size</text>

  <!-- Section: Badges -->
  <line x1="40" y1="262" x2="780" y2="262" stroke="#222" stroke-width="1"/>
  <text x="40" y="286" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="700" fill="#666" letter-spacing="2">BADGES</text>

  <!-- Orange pill -->
  <rect x="40" y="298" width="120" height="26" rx="13" fill="#f97316"/>
  <text x="100" y="315" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="700" fill="white" text-anchor="middle">₿ Live · mempool.space</text>

  <!-- Orange light -->
  <rect x="174" y="298" width="100" height="26" rx="13" fill="#fff7ed" stroke="#fed7aa" stroke-width="1"/>
  <text x="224" y="315" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="600" fill="#c2410c" text-anchor="middle">#857,482</text>

  <!-- Pool badge -->
  <rect x="288" y="298" width="100" height="26" rx="13" fill="rgba(0,0,0,0.7)"/>
  <text x="338" y="315" font-family="Inter, system-ui, sans-serif" font-size="11" fill="white" text-anchor="middle">Foundry USA</text>

  <!-- Special Edition yellow -->
  <rect x="402" y="298" width="110" height="26" rx="13" fill="#facc15"/>
  <text x="457" y="315" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="700" fill="#713f12" text-anchor="middle">Physical Art</text>

  <!-- Green success -->
  <rect x="526" y="298" width="110" height="26" rx="13" fill="#16a34a"/>
  <text x="581" y="315" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="600" fill="white" text-anchor="middle">✓ Image ready</text>

  <!-- Section: Cards -->
  <line x1="40" y1="342" x2="780" y2="342" stroke="#222" stroke-width="1"/>
  <text x="40" y="366" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="700" fill="#666" letter-spacing="2">CARD BORDERS &amp; HOVER STATES</text>

  <!-- Normal card -->
  <rect x="40" y="378" width="180" height="80" rx="10" fill="#1a1a1a" stroke="#374151" stroke-width="1.5"/>
  <text x="130" y="425" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#9ca3af" text-anchor="middle">Default card</text>
  <text x="130" y="448" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#555" text-anchor="middle">border-gray-700</text>

  <!-- Hover card -->
  <rect x="240" y="378" width="180" height="80" rx="10" fill="#1a1a1a" stroke="#fdba74" stroke-width="2"/>
  <text x="330" y="425" font-family="Inter, system-ui, sans-serif" font-size="12" fill="white" text-anchor="middle">Hovered card</text>
  <text x="330" y="448" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#555" text-anchor="middle">border-orange-300 + shadow</text>

  <!-- Action card (orange tinted) -->
  <rect x="440" y="378" width="180" height="80" rx="10" fill="rgba(249,115,22,0.08)" stroke="#fdba74" stroke-width="1.5"/>
  <text x="530" y="425" font-family="Inter, system-ui, sans-serif" font-size="12" fill="white" text-anchor="middle">Feature card</text>
  <text x="530" y="448" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#555" text-anchor="middle">orange tint bg + orange border</text>

  <!-- Dashed empty state -->
  <rect x="640" y="378" width="140" height="80" rx="10" fill="none" stroke="#374151" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="710" y="425" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#6b7280" text-anchor="middle">Empty state</text>
  <text x="710" y="448" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#555" text-anchor="middle">border-dashed</text>
</svg>
